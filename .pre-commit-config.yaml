# Pre-commit hooks configuration for Playwright Failure Analyzer
# Security-first approach with Python development tools
# See https://pre-commit.com for more information

default_language_version:
  python: python3.11

repos:
  # ============================================================================
  # SECURITY HOOKS (CRITICAL - Always run first)
  # ============================================================================

  # Detect hardcoded secrets, passwords, and API keys
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: 🔐 Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json

  # Comprehensive secret scanning with Gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: 🕵️ Gitleaks secret scanner
        exclude: ^\.secrets\.baseline$

  # GitHub Actions workflow validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.0
    hooks:
      - id: check-github-workflows
        name: ✅ Validate GitHub Actions workflows
        args: ["--verbose"]

  # Python security linting with Bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: 🛡️ Bandit security scan
        args: ['-r', 'src/', '-f', 'screen']
        pass_filenames: false

  # ============================================================================
  # PYTHON CODE QUALITY HOOKS
  # ============================================================================

  # Code formatting with Black
  - repo: https://github.com/psf/black
    rev: 26.3.0
    hooks:
      - id: black
        name: 🎨 Format code with Black
        args: ['--line-length=100']
        language_version: python3.11

  # Import sorting with isort
  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: 📦 Sort imports with isort
        args: ['--profile', 'black', '--line-length', '100']

  # Python linting with Flake8
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: 🔍 Lint with Flake8
        args: ['--max-line-length=100', '--ignore=E501,W503,E203', '--exclude=__pycache__']

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: 🔎 Type check with mypy
        args: ['--ignore-missing-imports', '--no-strict-optional']
        additional_dependencies: [types-requests]

  # ============================================================================
  # GENERAL FILE QUALITY HOOKS
  # ============================================================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # File format checks
      - id: check-yaml
        name: ✓ Check YAML syntax

      - id: check-json
        name: ✓ Check JSON syntax

      - id: check-toml
        name: ✓ Check TOML syntax

      - id: check-xml
        name: ✓ Check XML syntax

      # Code quality checks
      - id: check-ast
        name: ✓ Validate Python AST

      - id: check-builtin-literals
        name: ✓ Check builtin type constructor use

      - id: check-case-conflict
        name: ✓ Check for case conflicts

      - id: check-docstring-first
        name: ✓ Check docstring placement

      - id: check-merge-conflict
        name: ✓ Check for merge conflicts

      - id: check-added-large-files
        name: ✓ Prevent large files
        args: ['--maxkb=1000']

      - id: debug-statements
        name: ✓ Check for debug statements

      - id: detect-private-key
        name: 🔑 Detect private keys

      # File formatting
      - id: end-of-file-fixer
        name: ✓ Fix end of files

      - id: trailing-whitespace
        name: ✓ Trim trailing whitespace
        args: ['--markdown-linebreak-ext=md']

      - id: mixed-line-ending
        name: ✓ Fix mixed line endings
        args: ['--fix=lf']

      # Git checks
      - id: check-vcs-permalinks
        name: ✓ Check VCS permalinks

      - id: forbid-new-submodules
        name: ✓ Prevent new submodules

  # ============================================================================
  # MARKDOWN AND DOCUMENTATION
  # ============================================================================

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        name: 📝 Lint Markdown files
        args: ['--fix', '--disable', 'MD013', 'MD033', 'MD041']

  # ============================================================================
  # COMMIT MESSAGE VALIDATION
  # ============================================================================

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        name: 💬 Validate commit message format
        stages: [commit-msg]
        args: []
